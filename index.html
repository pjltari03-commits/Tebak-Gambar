<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Pintar: Tebak & Jawab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card {
            perspective: 1000px;
            cursor: pointer;
            height: 120px;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            font-weight: bold;
        }
        .card-front {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            color: white;
            font-size: 2rem;
        }
        .card-back {
            background-color: white;
            transform: rotateY(180deg);
            font-size: 1.5rem;
            border: 3px solid #6366f1;
            color: #1e293b;
        }
        .matched .card-inner {
            animation: success-pulse 0.5s ease-in-out;
        }
        @keyframes success-pulse {
            0% { transform: rotateY(180deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.1); border-color: #22c55e; }
            100% { transform: rotateY(180deg) scale(1); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center p-4 font-sans">

    <!-- Header -->
    <div class="max-w-2xl w-full mb-6">
        <div class="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
            <div>
                <h1 class="text-xl font-bold text-indigo-600">Game Pintar</h1>
                <p id="level-title" class="text-sm text-slate-500 font-medium">Level 1: Pasangan Hewan</p>
            </div>
            <div class="text-right">
                <p class="text-xs text-slate-400 uppercase tracking-wider">Skor</p>
                <p id="score-display" class="text-xl font-black text-slate-700">0</p>
            </div>
        </div>
    </div>

    <!-- Area Game Utama -->
    <div id="game-container" class="max-w-2xl w-full">
        <!-- Level 1 & 2: Board Kartu -->
        <div id="board" class="grid grid-cols-2 sm:grid-cols-5 gap-3"></div>

        <!-- Level 3: Quiz Container (Hidden initially) -->
        <div id="quiz-container" class="hidden bg-white p-6 rounded-3xl shadow-xl border border-indigo-100">
            <div id="quiz-content">
                <div class="mb-6">
                    <span class="bg-indigo-100 text-indigo-700 text-xs font-bold px-3 py-1 rounded-full uppercase">Pertanyaan</span>
                    <h2 id="question-text" class="text-2xl font-bold text-slate-800 mt-3 leading-tight"></h2>
                </div>
                <div id="options-grid" class="grid grid-cols-1 gap-3"></div>
            </div>
        </div>
    </div>

    <!-- Status Preview -->
    <div id="preview-status" class="mt-6 text-indigo-500 font-bold animate-pulse hidden">
        Perhatikan kartu... Mengingat dimulai!
    </div>

    <!-- Overlay Modal -->
    <div id="modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl transform transition-all">
            <div id="modal-icon" class="text-6xl mb-4">🎉</div>
            <h2 id="modal-title" class="text-3xl font-bold text-slate-800 mb-2">Hebat!</h2>
            <p id="modal-msg" class="text-slate-600 mb-8">Kamu berhasil menyelesaikan tantangan ini.</p>
            <button id="modal-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg active:scale-95">
                Lanjut
            </button>
        </div>
    </div>

    <script>
        const hewan = ['🐱', '🐶', '🐯', '🐘', '🦒', '🐱', '🐶', '🐯', '🐘', '🦒'];
        const mtk = [
            {q: '2 x 3', a: '6'}, {q: '5 x 2', a: '10'}, {q: '4 x 4', a: '16'}, 
            {q: '3 x 3', a: '9'}, {q: '1 x 8', a: '8'}
        ];
        const quizData = [
            {
                q: "Berapakah hasil dari 7 x 3?",
                options: ["14", "21", "28", "25"],
                correct: 1
            },
            {
                q: "Hewan mana yang dikenal sebagai 'Raja Hutan'?",
                options: ["Gajah", "Harimau", "Singa", "Zebra"],
                correct: 2
            },
            {
                q: "Berapakah kaki pada seekor laba-laba?",
                options: ["4", "6", "8", "10"],
                correct: 2
            }
        ];

        let currentLevel = 1;
        let score = 0;
        let flippedCards = [];
        let isLockBoard = false;
        let matches = 0;
        let currentQuizIndex = 0;

        const board = document.getElementById('board');
        const levelTitle = document.getElementById('level-title');
        const scoreDisplay = document.getElementById('score-display');
        const previewStatus = document.getElementById('preview-status');
        const modal = document.getElementById('modal');
        const modalBtn = document.getElementById('modal-btn');
        const quizContainer = document.getElementById('quiz-container');

        function initLevel() {
            board.innerHTML = '';
            flippedCards = [];
            matches = 0;
            isLockBoard = true;
            
            if (currentLevel === 1) {
                levelTitle.textContent = "Level 1: Hafalkan Pasangan Hewan";
                setupMatchingGame(hewan.sort(() => 0.5 - Math.random()));
            } else if (currentLevel === 2) {
                levelTitle.textContent = "Level 2: Matematika Ceria (Soal & Hasil)";
                const gameData = [];
                mtk.forEach(item => {
                    gameData.push({ val: item.q, match: item.a });
                    gameData.push({ val: item.a, match: item.q });
                });
                setupMatchingGame(gameData.sort(() => 0.5 - Math.random()), true);
            } else {
                startQuiz();
            }
        }

        function setupMatchingGame(data, isComplex = false) {
            quizContainer.classList.add('hidden');
            board.classList.remove('hidden');
            
            data.forEach((item, index) => {
                const card = document.createElement('div');
                card.classList.add('card');
                const content = isComplex ? item.val : item;
                const matchVal = isComplex ? item.match : item;
                
                card.dataset.value = content;
                card.dataset.match = matchVal;
                
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front">?</div>
                        <div class="card-back">${content}</div>
                    </div>
                `;
                
                card.addEventListener('click', () => handleCardClick(card));
                board.appendChild(card);
            });

            // Jalankan Preview
            setTimeout(() => {
                const allCards = document.querySelectorAll('.card');
                allCards.forEach(c => c.classList.add('flipped'));
                previewStatus.classList.remove('hidden');
                
                setTimeout(() => {
                    allCards.forEach(c => c.classList.remove('flipped'));
                    previewStatus.classList.add('hidden');
                    isLockBoard = false;
                }, 3000); // 3 detik untuk menghafal
            }, 500);
        }

        function handleCardClick(card) {
            if (isLockBoard || card.classList.contains('flipped') || card.classList.contains('matched')) return;

            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                checkMatch();
            }
        }

        function checkMatch() {
            isLockBoard = true;
            const [c1, c2] = flippedCards;
            
            const isMatch = c1.dataset.value === c2.dataset.match;

            if (isMatch) {
                c1.classList.add('matched');
                c2.classList.add('matched');
                matches++;
                score += 10;
                scoreDisplay.textContent = score;
                resetTurn();
                
                const totalPairs = currentLevel === 1 ? 5 : 5;
                if (matches === totalPairs) {
                    setTimeout(() => showModal("Luar Biasa!", "Kamu berhasil menyelesaikan level ini."), 600);
                }
            } else {
                setTimeout(() => {
                    c1.classList.remove('flipped');
                    c2.classList.remove('flipped');
                    resetTurn();
                }, 1000);
            }
        }

        function resetTurn() {
            flippedCards = [];
            isLockBoard = false;
        }

        function startQuiz() {
            levelTitle.textContent = "Level 3: Kuis Pengetahuan";
            board.classList.add('hidden');
            quizContainer.classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const data = quizData[currentQuizIndex];
            document.getElementById('question-text').textContent = data.q;
            const optionsGrid = document.getElementById('options-grid');
            optionsGrid.innerHTML = '';

            data.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "text-left p-4 rounded-xl border-2 border-slate-200 hover:border-indigo-500 hover:bg-indigo-50 transition-all font-semibold text-slate-700";
                btn.textContent = opt;
                btn.onclick = () => checkQuizAnswer(idx);
                optionsGrid.appendChild(btn);
            });
        }

        function checkQuizAnswer(idx) {
            const data = quizData[currentQuizIndex];
            if (idx === data.correct) {
                score += 20;
                scoreDisplay.textContent = score;
                currentQuizIndex++;
                
                if (currentQuizIndex < quizData.length) {
                    showQuestion();
                } else {
                    showModal("Selamat!", "Kamu telah menyelesaikan semua level dengan total skor: " + score, "Selesai");
                }
            } else {
                const btns = document.querySelectorAll('#options-grid button');
                btns[idx].classList.replace('border-slate-200', 'border-red-500');
                btns[idx].classList.add('bg-red-50', 'text-red-700');
                setTimeout(() => {
                    btns[idx].classList.replace('border-red-500', 'border-slate-200');
                    btns[idx].classList.remove('bg-red-50', 'text-red-700');
                }, 500);
            }
        }

        function showModal(title, msg, btnText = "Lanjut") {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-msg').textContent = msg;
            modalBtn.textContent = btnText;
            modal.classList.remove('hidden');
        }

        modalBtn.onclick = () => {
            modal.classList.add('hidden');
            if (currentLevel < 3) {
                currentLevel++;
                initLevel();
            } else {
                location.reload(); // Reset game
            }
        };

        window.onload = initLevel;
    </script>
</body>
</html>
